name: Scrape and Upload

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 6"

jobs:
  carrefour-bot:
    name: Test puppeteer
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      API_ENDPOINT: "${{ secrets.API_ENDPOINT }}"
      EMAIL: "${{ secrets.EMAIL }}"
      PASSWORD: "${{ secrets.PASSWORD }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "latest"

      - name: Install packages
        working-directory: scripts/carrefour
        run: npm ci

      - name: Run Puppeteer Script
        working-directory: scripts/carrefour
        run: node bot.js

      - name: Process Downloaded PDFs
        working-directory: scripts/carrefour
        run: node processPdfs.js
